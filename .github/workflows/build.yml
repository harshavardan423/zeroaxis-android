name: Build ZeroAxis Agent APK

on:
  push:
    branches: [ main, enterprise ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Inject flask_url into config.json
        run: |
          cat > app/src/main/assets/config.json <<EOF
          {
            "flask_url": "${{ secrets.FLASK_URL || 'https://zeroaxis.live' }}",
            "headless": false,
            "oem": false
          }
          EOF

      - name: Make gradlew executable
        run: |
          wget https://services.gradle.org/distributions/gradle-8.4-bin.zip -P /tmp
          unzip /tmp/gradle-8.4-bin.zip -d /tmp
          /tmp/gradle-8.4/bin/gradle wrapper
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZeroAxis-Agent
          path: app/build/outputs/apk/debug/*.apk
